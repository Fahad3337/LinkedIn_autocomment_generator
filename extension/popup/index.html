<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommentFlow Extension</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #060D1A;
      color: #EDF2FB;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid rgba(26, 58, 107, 0.4);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header img {
      width: 24px;
      height: 24px;
      border-radius: 6px;
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
    }
    .content {
      padding: 16px;
    }
    .label {
      display: block;
      font-size: 13px;
      color: #7A94BB;
      margin-bottom: 6px;
    }
    .input {
      width: 100%;
      box-sizing: border-box;
      background: #0A1628;
      border: 1px solid rgba(26, 58, 107, 0.4);
      color: #EDF2FB;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .input:focus {
      outline: none;
      border-color: #1A6EF5;
    }
    .button {
      width: 100%;
      background: #1A6EF5;
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .button:hover {
      background: #2D7FF6;
    }
    .status {
      margin-top: 16px;
      padding: 12px;
      border-radius: 6px;
      font-size: 13px;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #34D399;
      display: none;
    }
    .status.error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #F87171;
    }
    .status.connected {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>CommentFlow</h1>
  </div>
  
  <div class="content">
    <div id="setup-view">
      <p style="font-size: 13px; color: #7A94BB; margin-top: 0; margin-bottom: 16px;">
        Connect your extension to the dashboard using your API Access Key.
      </p>
      <label class="label">API Access Key</label>
      <input type="password" id="api-key" class="input" placeholder="eyJ..." />
      <button id="save-btn" class="button">Connect Account</button>
    </div>

    <div id="status-msg" class="status"></div>

    <div id="connected-view" style="display: none;">
      <div class="status connected" style="display: flex;">
        <div class="stat-row">
          <span>Status</span>
          <span style="font-weight: bold;">🟢 Extracted Info & Listening</span>
        </div>
      </div>
      <button id="disconnect-btn" class="button" style="background: transparent; border: 1px solid rgba(239,68,68,0.3); color: #F87171; margin-top: 16px;">
        Disconnect
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
